<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VenueMap CDO вАФ Event Venues</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg:       #020617;
      --surface:  #0F172A;
      --s2:       #1E293B;
      --border:   #334155;
      --text:     #F8FAFC;
      --muted:    #94A3B8;
      --dim:      #64748B;
      --green:    #22C55E;
      --gbg:      rgba(34,197,94,.12);
      --red:      #EF4444;
      --rbg:      rgba(239,68,68,.10);
      --yellow:   #EAB308;
      --r:        8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Fira Sans', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* вФАвФА Topbar вФАвФА */
    #topbar {
      height: 54px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px; flex-shrink: 0; z-index: 900;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon {
      width: 30px; height: 30px; background: var(--green);
      border-radius: 7px; display: grid; place-items: center; flex-shrink: 0;
    }
    .brand-name { font-family: 'Fira Code', monospace; font-size: 14px; font-weight: 600; }
    .brand-sub  { font-size: 11px; color: var(--dim); }
    .topbar-stats { display: flex; gap: 18px; }
    .tstat { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .tstat-val { font-family: 'Fira Code', monospace; font-size: 13px; font-weight: 600; color: var(--text); }
    .pulse {
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,.6); }
      70%  { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    /* вФАвФА Layout вФАвФА */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* вФАвФА Sidebar вФАвФА */
    #sidebar {
      width: 360px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .search-wrap { padding: 12px 12px 10px; border-bottom: 1px solid var(--border); }
    .search-inner { position: relative; }
    .search-inner svg {
      position: absolute; left: 9px; top: 50%;
      transform: translateY(-50%); color: var(--dim); pointer-events: none;
    }
    #search {
      width: 100%; background: var(--s2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 8px 10px 8px 32px;
      font-family: 'Fira Sans', sans-serif; font-size: 13px; color: var(--text);
      outline: none; transition: border-color 150ms;
    }
    #search::placeholder { color: var(--dim); }
    #search:focus { border-color: var(--green); }

    /* Filter chips */
    #filter-chips {
      padding: 8px 12px; display: flex; gap: 5px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .chip {
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
      border: 1px solid var(--border); color: var(--muted); background: transparent;
      cursor: pointer; transition: all 150ms; white-space: nowrap;
    }
    .chip:hover { border-color: var(--green); color: var(--green); }
    .chip.active { background: var(--green); border-color: var(--green); color: #000; font-weight: 700; }

    /* Result bar */
    #result-bar {
      padding: 6px 12px; font-size: 11px; color: var(--dim);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .open-toggle {
      display: flex; align-items: center; gap: 4px;
      cursor: pointer; font-size: 11px; color: var(--muted);
      user-select: none; transition: color 150ms;
    }
    .open-toggle:hover, .open-toggle.active { color: var(--green); }
    .tog-box {
      width: 13px; height: 13px; border: 1.5px solid currentColor;
      border-radius: 3px; display: grid; place-items: center; flex-shrink: 0;
    }
    .tog-check { display: none; }
    .open-toggle.active .tog-check { display: block; }

    /* Venue list */
    #venue-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--s2) transparent; }
    #venue-list::-webkit-scrollbar { width: 4px; }
    #venue-list::-webkit-scrollbar-thumb { background: var(--s2); border-radius: 2px; }

    .vcard {
      padding: 11px 12px; border-bottom: 1px solid rgba(51,65,85,.4);
      cursor: pointer; transition: background 150ms;
    }
    .vcard:hover { background: var(--s2); }
    .vcard.active { background: rgba(34,197,94,.07); border-left: 2px solid var(--green); }
    .vcard-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; }
    .vcard-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .vcard-stars {
      display: flex; align-items: center; gap: 2px;
      font-family: 'Fira Code', monospace; font-size: 12px; font-weight: 600;
      color: var(--yellow); flex-shrink: 0;
    }
    .vcard-cat  { font-size: 11px; color: var(--dim); margin-top: 2px; }
    .vcard-addr { font-size: 11px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .vcard-foot { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
    .badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
    .badge-open   { background: var(--gbg); color: var(--green); }
    .badge-closed { background: var(--rbg); color: var(--red); }
    .vcard-rc { font-size: 10px; color: var(--dim); }

    /* No results */
    #no-results { display: none; padding: 48px 20px; text-align: center; color: var(--muted); }
    #no-results svg { opacity: .25; margin-bottom: 14px; }
    #no-results h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    #no-results p  { font-size: 12px; color: var(--dim); }

    /* вФАвФА Map вФАвФА */
    #map { flex: 1; }

    /* вФАвФА Popup overrides вФАвФА */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important; color: var(--text) !important;
      border: 1px solid var(--border) !important; border-radius: 12px !important;
      box-shadow: 0 24px 48px rgba(0,0,0,.6) !important; padding: 0 !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { margin: 0 !important; width: 300px !important; max-height: 72vh; overflow-y: auto; }
    .leaflet-popup-content::-webkit-scrollbar { width: 4px; }
    .leaflet-popup-content::-webkit-scrollbar-thumb { background: var(--s2); }
    .leaflet-popup-close-button { color: var(--muted) !important; font-size: 16px !important; top: 10px !important; right: 10px !important; }
    .pop { padding: 14px 14px 6px; font-family: 'Fira Sans', sans-serif; font-size: 13px; }
    .pop-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 7px; }
    .pop-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; margin-bottom: 10px; }
    .pop-rating { display: flex; align-items: center; gap: 3px; font-family: 'Fira Code', monospace; font-size: 12px; font-weight: 600; color: var(--yellow); }
    .pop-catbadge { font-size: 10px; background: var(--s2); color: var(--muted); padding: 2px 7px; border-radius: 4px; }
    .pop-hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    .pop-row { display: flex; gap: 7px; margin-bottom: 6px; align-items: flex-start; font-size: 12px; color: var(--muted); }
    .pop-row svg { flex-shrink: 0; color: var(--dim); margin-top: 1px; }
    .pop-row .v { color: var(--text); }
    .pop-row a { color: var(--green); text-decoration: none; }
    .pop-row a:hover { text-decoration: underline; }
    .pop-stitle { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); margin: 10px 0 5px; display: flex; align-items: center; gap: 4px; }
    .pop-hours-grid { display: grid; grid-template-columns: 80px 1fr; gap: 2px 6px; }
    .pop-hours-grid .d { font-size: 11px; color: var(--dim); }
    .pop-hours-grid .t { font-size: 11px; font-family: 'Fira Code', monospace; color: var(--muted); }
    .pop-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .pop-tag { font-size: 10px; background: var(--s2); color: var(--muted); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; }
    .pop-review { background: var(--s2); border-radius: 6px; padding: 8px 10px; margin-bottom: 5px; }
    .pop-review-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .pop-review-author { font-size: 12px; font-weight: 600; color: var(--text); }
    .pop-review-stars  { font-size: 10px; color: var(--yellow); }
    .pop-review-text   { font-size: 11px; color: var(--muted); line-height: 1.5; }
    .pop-links { display: flex; gap: 7px; padding: 10px 14px 12px; }
    .pop-link {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
      padding: 7px; border-radius: 7px; font-size: 11px; font-weight: 600;
      text-decoration: none; cursor: pointer; transition: all 150ms;
    }
    .pop-link-p { background: var(--green); color: #000; }
    .pop-link-p:hover { background: #16a34a; }
    .pop-link-s { background: var(--s2); color: var(--text); border: 1px solid var(--border); }
    .pop-link-s:hover { border-color: var(--green); color: var(--green); }

    /* вФАвФА Mobile вФАвФА */
    @media (max-width: 700px) {
      #main { flex-direction: column; }
      #sidebar { width: 100%; height: 240px; border-right: none; border-top: 1px solid var(--border); order: 2; }
      #map { order: 1; min-height: 300px; }
      .topbar-stats, #filter-chips { display: none; }
    }
  </style>
</head>

  h += `</div><hr class="pop-hr">`;

  if (addr)        h += `<div class="pop-row">${I.pin}<span class="v">${addr}</span></div>`;
  if (d.locatedIn) h += `<div class="pop-row">${I.bld}<span class="v">In: ${d.locatedIn}</span></div>`;
  if (d.plusCode)  h += `<div class="pop-row">${I.code}<span class="v">${d.plusCode}</span></div>`;
  if (d.phone)     h += `<div class="pop-row">${I.phone}<span class="v">${d.phone}</span></div>`;
  if (d.website)   h += `<div class="pop-row">${I.globe}<a href="${d.website}" target="_blank" rel="noopener">${d.website.replace(/^https?:\/\//,'').split('/')[0]}</a></div>`;
  if (v.coords)    h += `<div class="pop-row">${I.pin}<span class="v" style="color:var(--dim);font-family:'Fira Code',monospace;font-size:10px">${v.coords.lat.toFixed(5)}, ${v.coords.lng.toFixed(5)}</span></div>`;

  const wh = d.weeklyHours ?? {};
  const whDays = DAYS.filter((day) => wh[day]);
  if (whDays.length) {
    h += `<div class="pop-stitle">${I.clock} Weekly hours</div><div class="pop-hours-grid">`;
    whDays.forEach((day) => { h += `<span class="d">${day}</span><span class="t">${cleanHours(wh[day])}</span>`; });
    h += `</div>`;
  }

  if (d.reviewKeywords?.length) {
    h += `<div class="pop-stitle">${I.tag} Topics</div><div class="pop-tags">`;
    d.reviewKeywords.slice(0, 8).forEach((k) => { h += `<span class="pop-tag">${k}</span>`; });
    h += `</div>`;
  }

  if (d.featureLabels?.length) {
    h += `<div class="pop-stitle">${I.tag} Features</div><div class="pop-tags">`;
    d.featureLabels.slice(0, 8).forEach((f) => { h += `<span class="pop-tag">${f}</span>`; });
    h += `</div>`;
  }

  if (d.description) {
    const desc = d.description.slice(0, 200);
    h += `<hr class="pop-hr"><p style="font-size:11px;color:var(--muted);line-height:1.6">${desc}${d.description.length > 200 ? 'вА¶' : ''}</p>`;
  }

  const revs = (d.reviews ?? []).filter((r) => r.text).slice(0, 2);
  if (revs.length) {
    h += `<div class="pop-stitle">Reviews</div>`;
    revs.forEach((r) => {
      const badge = r.isLocalGuide ? ' <span style="color:var(--green);font-size:9px">Local Guide</span>' : '';
      h += `<div class="pop-review">
        <div class="pop-review-top">
          <span class="pop-review-author">${r.author ?? 'Anonymous'}${badge}</span>
          ${r.rating ? `<span class="pop-review-stars">${'вШЕ'.repeat(r.rating)}</span>` : ''}
        </div>
        <div class="pop-review-text">${(r.text ?? '').slice(0, 140)}${(r.text ?? '').length > 140 ? 'вА¶' : ''}</div>
      </div>`;
    });
  }

  if (d.peopleAlsoSearch?.length) {
    h += `<hr class="pop-hr"><div class="pop-stitle">People also search</div><div class="pop-tags">`;
    d.peopleAlsoSearch.slice(0, 4).forEach((s) => { h += `<span class="pop-tag">${s}</span>`; });
    h += `</div>`;
  }

  h += `</div>`;
  h += `<div class="pop-links">`;
  if (v.url)     h += `<a class="pop-link pop-link-p" href="${v.url}" target="_blank" rel="noopener">${I.mapb} Google Maps</a>`;
  if (d.website) h += `<a class="pop-link pop-link-s" href="${d.website}" target="_blank" rel="noopener">${I.ext} Website</a>`;
  h += `</div>`;

  return h;
};

/* вФАвФА map вФАвФА */
const avgLat = venues.reduce((s, v) => s + v._coords[0], 0) / venues.length;
const avgLng = venues.reduce((s, v) => s + v._coords[1], 0) / venues.length;

const map = L.map('map', { zoomControl: false }).setView([avgLat, avgLng], 13);
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  maxZoom: 19,
}).addTo(map);

const makePin = (color) => L.divIcon({
  className: '',
  iconAnchor : [12, 28],
  popupAnchor: [0, -30],
  html: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="32" viewBox="0 0 24 32">
    <path d="M12 0C5.4 0 0 5.4 0 12c0 8.4 12 20 12 20S24 20.4 24 12C24 5.4 18.6 0 12 0z" fill="${color}"/>
    <circle cx="12" cy="12" r="5" fill="#000" opacity=".3"/>
    <circle cx="12" cy="12" r="3.5" fill="#fff"/>
  </svg>`,
});

const PIN_ACTIVE = makePin('#22C55E');
const PIN_DIM    = makePin('#475569');

/* вФАвФА state вФАвФА */
let showOpenOnly = false;
let activeIdx    = null;
let currentList  = [];
let markers      = [];

/* вФАвФА render вФАвФА */
const renderList = () => {
  const q = document.getElementById('search').value.toLowerCase().trim();

  currentList = venues.filter((v) => {
    if (activeCategory !== 'All' && v.location?.category !== activeCategory) return false;
    if (showOpenOnly && !isOpen(v)) return false;
    if (q) {
      const hay = [v.name, v.location?.category, v.details?.fullAddress, v.location?.address].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const listEl = document.getElementById('venue-list');
  const noRes  = document.getElementById('no-results');
  document.getElementById('result-count').textContent = `${currentList.length} venue${currentList.length !== 1 ? 's' : ''}`;

  if (!currentList.length) {
    listEl.innerHTML = '';
    noRes.style.display = 'block';
  } else {
    noRes.style.display = 'none';
    listEl.innerHTML = currentList.map((v) => {
      const d    = v.details ?? {};
      const vidx = venues.indexOf(v);
      const hrs  = v.location?.hours ?? '';
      const addr = d.fullAddress ?? v.location?.address ?? '';
      return `<div class="vcard${vidx === activeIdx ? ' active' : ''}" data-vidx="${vidx}">
        <div class="vcard-top">
          <div class="vcard-name">${v.name}</div>
          ${v.rating ? `<div class="vcard-stars">${stars(v.rating, 10)}&nbsp;${v.rating}</div>` : ''}
        </div>
        <div class="vcard-cat">${v.location?.category ?? ''}</div>
        ${addr ? `<div class="vcard-addr">${addr}</div>` : ''}
        <div class="vcard-foot">
          ${/^open/i.test(hrs) ? '<span class="badge badge-open">Open</span>' : /^closed/i.test(hrs) ? '<span class="badge badge-closed">Closed</span>' : ''}
          ${d.reviewCount ? `<span class="vcard-rc">${d.reviewCount.toLocaleString()} reviews</span>` : ''}
        </div>
      </div>`;
    }).join('');

    listEl.querySelectorAll('.vcard').forEach((el) =>
      el.addEventListener('click', () => selectVenue(parseInt(el.dataset.vidx, 10)))
    );
  }

  /* markers */
  markers.forEach((m) => m.remove());
  markers = currentList.map((v) => {
    const vidx = venues.indexOf(v);
    const m = L.marker(v._coords, { icon: vidx === activeIdx ? PIN_ACTIVE : PIN_DIM })
      .addTo(map)
      .bindPopup(buildPopup(v), { maxWidth: 320 });
    m.on('click', () => selectVenue(vidx));
    return m;
  });
};

const selectVenue = (vidx) => {
  activeIdx = vidx;
  const v = venues[vidx];
  if (!v) return;

  document.querySelectorAll('.vcard').forEach((c) => c.classList.remove('active'));
  const card = document.querySelector(`.vcard[data-vidx="${vidx}"]`);
  if (card) { card.classList.add('active'); card.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }

  markers.forEach((m, i) => m.setIcon(currentList[i] && venues.indexOf(currentList[i]) === vidx ? PIN_ACTIVE : PIN_DIM));

  const ci = currentList.indexOf(v);
  map.setView(v._coords, Math.max(map.getZoom(), 15), { animate: true });
  if (ci >= 0 && markers[ci]) markers[ci].openPopup();
};

/* вФАвФА events вФАвФА */
let debounce;
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => { activeIdx = null; renderList(); }, 200);
});

document.getElementById('open-toggle').addEventListener('click', function () {
  showOpenOnly = !showOpenOnly;
  this.classList.toggle('active', showOpenOnly);
  activeIdx = null;
  renderList();
});

renderList();
</script>
</body>
</html>
